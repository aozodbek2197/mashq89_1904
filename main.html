<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>39. Animated Progress Bar</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 80px; background: #222; color: white; }
    .progress-container { width: 600px; margin: 40px auto; }
    .progress-bar { height: 30px; background: #333; border-radius: 50px; overflow: hidden; }
    .progress { height: 100%; background: linear-gradient(90deg, #00ff88, #00cc66); width: 0%; transition: width 2s ease; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
    button { padding: 15px 40px; font-size: 18px; background: #00cc66; border: none; border-radius: 50px; cursor: pointer; margin-top: 30px; }
  </style>
</head>
<body>
  <h1>Yuklanish jarayoni</h1>
  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress" id="progress">0%</div>
    </div>
  </div>
  <button onclick="startProgress()">Yuklashni boshlash</button>

  <script>
    function startProgress() {
      const progress = document.getElementById('progress');
      let width = 0;
      const interval = setInterval(() => {
        width += Math.random() * 8 + 2;
        if (width >= 100) {
          width = 100;
          clearInterval(interval);
        }
        progress.style.width = width + '%';
        progress.textContent = Math.floor(width) + '%';
      }, 80);
    }
  </script>
</body>
</html>
